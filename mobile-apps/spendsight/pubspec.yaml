name: spendsight
description: A personal finance tracker with clarity and speed
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  
  # Charts & Data Visualization
  fl_chart: ^0.66.0
  
  # State Management
  provider: ^6.1.1
  
  # Database - SQLite
  sqflite: ^2.3.0
  sqflite_common_ffi_web: ^0.4.2+2
  path: ^1.8.3
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3
  
  # Storage
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
