name: tracinvent_mobile
description: TracInvent inventory — mobile companion with the same features as desktop (local SQLite, multi-warehouse, adjustments).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10

  # Mobile SQLite (same schema as desktop app)
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^1.0.0
  path_provider: ^2.1.1
  path: ^1.8.3

  provider: ^6.1.1

  intl: ^0.18.1
  uuid: ^4.2.1
  crypto: ^3.0.3

  http: ^1.1.0
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2

  pdf: ^3.10.7
  printing: ^5.11.1
  excel: ^4.0.6
  barcode_widget: ^2.0.4

  file_picker: ^6.1.1
  fl_chart: ^0.68.0
  table_calendar: ^3.0.9
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
