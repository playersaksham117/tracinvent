name: billease_pos
description: Premium offline-first POS system with Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Local Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # State Management
  provider: ^6.1.1
  get_it: ^7.6.4
  
  # Network & Sync
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  supabase_flutter: ^2.0.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  
  # Barcode & QR
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0
  barcode: ^2.2.8
  barcode_widget: ^2.0.4
  
  # Printing
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  image_picker: ^1.0.5
  csv: ^5.1.1
  file_picker: ^6.1.1
  
  # Animations
  flutter_animate: ^4.3.0
  smooth_page_indicator: ^1.1.0
  
  # Charts
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
