name: tracinvent
description: Advanced Inventory Tracking System with Multi-location Management
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10
  
  # Database
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # State Management
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  crypto: ^3.0.3
  
  # Network & Sync
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  
  # PDF & Export
  pdf: ^3.10.7
  printing: ^5.11.1
  excel: ^4.0.6
  barcode_widget: ^2.0.4
  qr_flutter: ^4.1.0
  image: ^4.0.0
  
  # File Picker
  file_picker: ^6.1.1
  
  # Charts
  fl_chart: ^0.68.0
  
  # Date & Time
  table_calendar: ^3.0.9
  
  # CSV Parsing
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
