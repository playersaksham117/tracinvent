name: BillEase POS Mobile Windows CI/CD

on:
  push:
    tags:
      - 'billease-pos-mobile-v*'
    paths:
      - 'mobile-apps/billease_pos_mobile/**'
      - 'desktop-apps/billease-pos/**'
      - '.github/workflows/billease-pos-mobile-windows-release.yml'
  pull_request:
    paths:
      - 'mobile-apps/billease_pos_mobile/**'
      - 'desktop-apps/billease-pos/**'
      - '.github/workflows/billease-pos-mobile-windows-release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-apps/billease_pos_mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

  build-windows-installer:
    needs: analyze
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile-apps/billease_pos_mobile
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/billease-pos-mobile-v*') {
            $v = $env:GITHUB_REF_NAME -replace '^billease-pos-mobile-v',''
          } else {
            $v = '${{ github.event.inputs.version }}'
            if ([string]::IsNullOrWhiteSpace($v)) { $v = '1.0.0' }
          }
          "version=$v" >> $env:GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --dart-define=APP_VERSION=${{ steps.version.outputs.version }}

      - name: Locate ISCC (Inno Setup Compiler)
        id: iscc
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          )
          $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            Write-Host "Inno Setup not found pre-installed — installing via Chocolatey..."
            choco install innosetup --yes --no-progress
            $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $found) { throw "Cannot locate ISCC.exe after install attempt" }
          Write-Host "ISCC found at: $found"
          "iscc_path=$found" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: |
          & "${{ steps.iscc.outputs.iscc_path }}" `
            installer\billease_pos_mobile.iss `
            "/DMyAppVersion=${{ steps.version.outputs.version }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: billease-pos-mobile-windows-installer
          path: mobile-apps/billease_pos_mobile/installer/output/*.exe
          if-no-files-found: error

  publish-release:
    needs: build-windows-installer
    if: startsWith(github.ref, 'refs/tags/billease-pos-mobile-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: billease-pos-mobile-windows-installer
          path: release

      - name: Write checksums
        run: |
          cd release
          sha256sum *.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BillEase POS Mobile v${{ needs.build-windows-installer.outputs.version }}
          body: |
            ## BillEase POS Mobile v${{ needs.build-windows-installer.outputs.version }}

            ### Safe update (database preserved)
            - User data stays in `{InstallDir}\data\billease_pos.db`
            - Automatic schema migration on first launch after update

            ### Install / update from app
            1. Open **Settings → App Updates**
            2. Click **Download & Install**
            3. The app closes, installs silently, and restarts

            ### Manual install
            1. Close BillEase POS Mobile
            2. Run `BillEasePOSMobile-Setup-*-x64.exe`
            3. Silent: `/SILENT /CLOSEAPPLICATIONS`

            ### Checksum
            See `SHA256SUMS.txt` in this release.
          files: |
            release/*.exe
            release/SHA256SUMS.txt
