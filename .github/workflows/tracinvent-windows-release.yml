name: TracInvent Windows CI/CD

on:
  push:
    tags:
      - 'tracinvent-v*'
    paths:
      - 'desktop-apps/tracinvent/**'
      - '.github/workflows/tracinvent-windows-release.yml'
  pull_request:
    paths:
      - 'desktop-apps/tracinvent/**'
      - '.github/workflows/tracinvent-windows-release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 1.1.0)'
        required: true
        default: '1.1.0'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop-apps/tracinvent
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

  build-windows-installer:
    needs: analyze
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-apps/tracinvent
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/tracinvent-v*') {
            $v = $env:GITHUB_REF_NAME -replace '^tracinvent-v',''
          } else {
            $v = '${{ github.event.inputs.version }}'
            if ([string]::IsNullOrWhiteSpace($v)) { $v = '1.1.0' }
          }
          "version=$v" >> $env:GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release --dart-define=APP_VERSION=${{ steps.version.outputs.version }}

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "Inno Setup compiler not found at $iscc" }
          & $iscc installer/tracinvent.iss "/DMyAppVersion=${{ steps.version.outputs.version }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tracinvent-windows-installer
          path: desktop-apps/tracinvent/installer/output/*.exe
          if-no-files-found: error

  publish-release:
    needs: build-windows-installer
    if: startsWith(github.ref, 'refs/tags/tracinvent-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tracinvent-windows-installer
          path: release

      - name: Write checksums
        run: |
          cd release
          sha256sum *.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TracInvent v${{ needs.build-windows-installer.outputs.version }}
          body: |
            ## TracInvent v${{ needs.build-windows-installer.outputs.version }}

            ### Safe update (database preserved)
            - User data stays in `{InstallDir}\data\tracinvent.db` — installer never overwrites it
            - Automatic schema migration on first launch after update
            - Pre-upgrade `.bak` backup created before any migration runs

            ### Install / update
            1. Close TracInvent
            2. Run `TracInvent-Setup-*-x64.exe`
            3. Silent: `/SILENT /CLOSEAPPLICATIONS`
            4. Open app — check **Settings → Application Updates** for version

            ### Checksum
            See `SHA256SUMS.txt` in this release.
          files: |
            release/*.exe
            release/SHA256SUMS.txt
